<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">FinModelPro placeholder</title>
  <desc id="desc">Default fallback illustration for missing content images.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="55%" stop-color="#e3f0ff"/>
      <stop offset="100%" stop-color="#d7ebff"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f8ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d5bba"/>
      <stop offset="100%" stop-color="#4f84ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1c3f78" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1340" cy="140" r="190" fill="#c7e2ff" opacity="0.35"/>
  <circle cx="220" cy="860" r="220" fill="#bfdfff" opacity="0.28"/>

  <g filter="url(#shadow)">
    <rect x="180" y="150" width="1240" height="700" rx="34" fill="url(#card)" stroke="#cde0f5" stroke-width="2"/>
  </g>

  <rect x="260" y="250" width="480" height="26" rx="13" fill="#d4e4f7"/>
  <rect x="260" y="300" width="390" height="20" rx="10" fill="#dbe8f8"/>
  <rect x="260" y="336" width="340" height="20" rx="10" fill="#dbe8f8"/>

  <rect x="260" y="430" width="720" height="300" rx="18" fill="#f7fbff" stroke="#d5e4f5"/>
  <polyline points="300,670 420,560 520,610 650,500 760,540 900,450" fill="none" stroke="url(#accent)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="420" cy="560" r="12" fill="#2d5bba"/>
  <circle cx="650" cy="500" r="12" fill="#2d5bba"/>
  <circle cx="900" cy="450" r="12" fill="#2d5bba"/>

  <rect x="1040" y="430" width="280" height="300" rx="18" fill="#f7fbff" stroke="#d5e4f5"/>
  <rect x="1090" y="610" width="36" height="80" rx="8" fill="#8bb7f1"/>
  <rect x="1140" y="560" width="36" height="130" rx="8" fill="#6fa3e8"/>
  <rect x="1190" y="510" width="36" height="180" rx="8" fill="#4f84ea"/>
  <rect x="1240" y="470" width="36" height="220" rx="8" fill="#2d5bba"/>

</svg>
