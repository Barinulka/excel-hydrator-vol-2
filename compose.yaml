
services:
  excel-hydrator:
    build:
      context: ./go/excel-hydrator
    ports:
      - "8081:8080"
    volumes:
      - ./excel/templates:/app/templates:ro
      - ./excel/output:/app/output
    restart: unless-stopped

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-excel-hydrator}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-excel-hydrator}
      POSTGRES_USER: ${POSTGRES_USER:-excel-hydrator}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-test}", "-U", "${POSTGRES_USER:-test}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    ports:
      - 6101:5432
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
