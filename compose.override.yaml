services:
  nginx:
    build: null
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
      - public_images_main:/var/www/html/public/images/main:ro

  app:
    build:
      target: app
      args:
        INSTALL_DEV: "1"
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      DEFAULT_URI: http://localhost:${APP_PORT:-8080}
      MAILER_DSN: smtp://mailer:1025
    volumes:
      - .:/var/www/html
      - symfony_vendor_dev:/var/www/html/vendor
      - symfony_var:/var/www/html/var
      - excel_output:/var/www/html/excel/output
      - public_images_main:/var/www/html/public/images/main

  excel-hydrator:
    ports:
      - "8081:8080"

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "6101:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

volumes:
  symfony_vendor_dev:
  symfony_var:
